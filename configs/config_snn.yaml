# ===================================================================
# Receptor-Based SNN Configuration for MAPF
# ===================================================================
# This config uses biologically-inspired neurotransmitter receptors:
# - AMPA: Fast excitation (τ=2ms)
# - NMDA: Slow excitation (τ=50ms) 
# - GABAA: Fast inhibition (τ=6ms)
# - GABAB: Slow inhibition (τ=150ms)
# ===================================================================

# Training Parameters
epochs: 50
batch_size: 8
learning_rate: 0.0001
weight_decay: 0.00001
sequence_length: 50

# Environment
board_size: [9, 9]
num_actions: 5
num_agents: 5

# Network Architecture
hidden_dim: 128
input_dim: 147

# SNN Enhancements (optional features)
num_snn_blocks: 3
use_residual_connections: true
use_recurrent_memory: true
recurrent_memory_dim: 128
use_agent_communication: true
communication_dim: 64
communication_hops: 2
num_attention_heads: 4
use_predictive_model: true
prediction_horizon: 3

# Receptor Dynamics (new biologically-inspired parameters)
lif_dt: 1.0                # Timestep in ms
lif_tau: 20.0              # Membrane time constant (ms)
lif_v_threshold: 1.0       # Spike threshold (normalized)
lif_v_reset: 0.0          # Reset potential
lif_v_rest: 0.0           # Resting potential

# Neuromodulation & Rewards
reward_scale: 0.01
punishment_scale: 0.15
goal_reward: 100.0
collision_punishment: -3.0
step_penalty: -1.0
stay_penalty: -10.0
cooperation_bonus: 1.0

# Spike Health Monitoring
spike_rate_penalty: -2.0
min_spike_rate_threshold: 0.03
high_spike_penalty: -10.0
max_spike_rate_threshold: 0.15
reward_reduction_factor: 0.7

# Training Stability
reward_decay: 0.95
trace_length: 13
entropy_coefficient: 0.01
activity_regularization_strength: 0.001
input_noise_level: 0.01
reward_scale_factor: 10.0
expected_expert_trajectory_length: 16

# Dataset Configuration
train:
  root_dir: 'dataset/5_8_28'
  min_time: 4
  max_time_dl: 60
  nb_agents: 5
  batch_size: 8
  num_workers: 0

valid:
  root_dir: 'dataset/5_8_28'
  min_time: 4
  max_time_dl: 60
  nb_agents: 5
  batch_size: 4
  num_workers: 0

# Checkpointing
save_dir: 'checkpoints'
